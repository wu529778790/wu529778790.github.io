server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Noise reduction: stop logging static asset requests ──
    location ~* \.(?:png|jpe?g|gif|ico|svg|webp|avif|js|css|woff2?|ttf|eot|map|mp4|webm)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Scanner / exploit probe drops (444 = close connection, no response) ──

    location ~ /\.env            { access_log off; return 444; }
    location ~ /\.git            { access_log off; return 444; }
    location ~ /\.aws            { access_log off; return 444; }
    location ~ \.php$            { access_log off; return 444; }

    location ~ ^/(wp-admin|wp-login|wp-content|wp-includes|phpmyadmin|administrator) {
        access_log off; return 444;
    }

    location ~ ^/(admin|about|index|backend|test|console|eval-stdin|xmlrpc)\.? {
        access_log off; return 444;
    }

    location ~ (/BACKUP|/backup|/old|/bak) {
        access_log off; return 444;
    }

    location /API/               { access_log off; return 444; }

    # ── Old hexo /categories/ route: return 410 Gone (correct SEO signal) ──
    location /categories/ {
        access_log off;
        return 410;
    }

    # ── SPA fallback for real VitePress pages ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Custom 404 page ──
    error_page 404 /404.html;
    location = /404.html { internal; }

    # ── Security headers on HTML ──
    location ~* \.html$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
